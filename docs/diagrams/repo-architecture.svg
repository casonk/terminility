28,1116.8038 L501.9659,1116.8038 A2.5,2.5 0 0 1 504.4659,1119.3038 L504.4659,1188.5075 A2.5,2.5 0 0 1 501.9659,1191.0075 L259.4628,1191.0075 A2.5,2.5 0 0 1 256.9628,1188.5075 L256.9628,1098.3038 A2.5,2.5 0 0 1 259.4628,1095.8038" fill="#FFE6CC" style="stroke:#181818;stroke-width:0.5;"/><line style="stroke:#181818;stroke-width:0.5;" x1="256.9628" x2="309.9628" y1="1116.8038" y2="1116.8038"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="206.2192" x="266.9628" y="1138.7697">/.tmux/plugins/tmux-resurrect/</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="217.5031" x="266.9628" y="1157.8376">/.tmux/plugins/tmux-continuum/</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="91.1956" x="266.9628" y="1176.9055">plugin installs</text></g><!--entity RT_SAVES--><g class="entity" data-qualified-name="RUNTIME_PANEL.RT_SAVES" data-source-line="42" id="ent0016"><path d="M866.323,1095.8038 L907.323,1095.8038 A3.75,3.75 0 0 1 909.823,1098.3038 L916.823,1116.8038 L1005.1705,1116.8038 A2.5,2.5 0 0 1 1007.6705,1119.3038 L1007.6705,1169.4396 A2.5,2.5 0 0 1 1005.1705,1171.9396 L866.323,1171.9396 A2.5,2.5 0 0 1 863.823,1169.4396 L863.823,1098.3038 A2.5,2.5 0 0 1 866.323,1095.8038" fill="#FFE6CC" style="stroke:#181818;stroke-width:0.5;"/><line style="stroke:#181818;stroke-width:0.5;" x1="863.823" x2="916.823" y1="1116.8038" y2="1116.8038"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="113.8476" x="873.823" y="1138.7697">/.tmux/resurrect/</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="112.2376" x="873.823" y="1157.8376">session save files</text></g><!--entity RT_ALIASES--><g class="entity" data-qualified-name="RUNTIME_PANEL.RT_ALIASES" data-source-line="43" id="ent0017"><path d="M1030.1705,1095.8038 L1071.1705,1095.8038 A3.75,3.75 0 0 1 1073.6705,1098.3038 L1080.6705,1116.8038 L1181.702,1116.8038 A2.5,2.5 0 0 1 1184.202,1119.3038 L1184.202,1169.4396 A2.5,2.5 0 0 1 1181.702,1171.9396 L1030.1705,1171.9396 A2.5,2.5 0 0 1 1027.6705,1169.4396 L1027.6705,1098.3038 A2.5,2.5 0 0 1 1030.1705,1095.8038" fill="#FFE6CC" style="stroke:#181818;stroke-width:0.5;"/><line style="stroke:#181818;stroke-width:0.5;" x1="1027.6705" x2="1080.6705" y1="1116.8038" y2="1116.8038"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="126.5315" x="1037.6705" y="1138.7697">/.terminility_aliases</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="125.1035" x="1037.6705" y="1157.8376">generated alias file</text></g><!--entity RT_RC--><g class="entity" data-qualified-name="RUNTIME_PANEL.RT_RC" data-source-line="44" id="ent0018"><path d="M1206.702,1095.8038 L1247.702,1095.8038 A3.75,3.75 0 0 1 1250.202,1098.3038 L1257.202,1116.8038 L1458.2912,1116.8038 A2.5,2.5 0 0 1 1460.7912,1119.3038 L1460.7912,1169.4396 A2.5,2.5 0 0 1 1458.2912,1171.9396 L1206.702,1171.9396 A2.5,2.5 0 0 1 1204.202,1169.4396 L1204.202,1098.3038 A2.5,2.5 0 0 1 1206.702,1095.8038" fill="#FFE6CC" style="stroke:#181818;stroke-width:0.5;"/><line style="stroke:#181818;stroke-width:0.5;" x1="1204.202" x2="1257.202" y1="1116.8038" y2="1116.8038"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="147.1254" x="1214.202" y="1138.7697">/.bash_aliases / /.zshrc</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="226.5891" x="1214.202" y="1157.8376">shell RC files (source guard added)</text></g><!--entity EXT_GIT--><g class="entity" data-qualified-name="EXT_PANEL.EXT_GIT" data-source-line="48" id="ent0020"><rect fill="#FFF2CC" height="69.0323" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="194.0012" x="472.8946" y="127.4803"/><text fill="#000000" font-family="Arial" font-