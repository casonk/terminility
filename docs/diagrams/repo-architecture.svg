<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="1537px" preserveAspectRatio="none" style="width:1549px;height:1537px;background:#FFFFFF;" version="1.1" viewBox="0 0 1549 1537" width="1549px" zoomAndPan="magnify"><title>terminility Repository Architecture (Contributor Blueprint)</title><defs/><g><g class="title" data-source-line="2"><text fill="#000000" font-family="sans-serif" font-size="28" font-weight="bold" lengthAdjust="spacing" textLength="806.62" x="361.9003" y="39.9321">terminility Repository Architecture (Contributor Blueprint)</text></g><rect fill="none" height="683.6029" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="940.5782" x="302.2133" y="291.8567"/><text fill="#000000" font-family="Arial" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="67.5544" x="738.7252" y="306.6848">Layer Stack</text><rect fill="none" height="124.0323" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="841.5248" x="701.8958" y="87.4803"/><text fill="#000000" font-family="Arial" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="126.9609" x="1059.1777" y="102.3084">Source Files (tracked)</text><rect fill="none" height="150.2038" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="1233.8284" x="241.9628" y="1055.8038"/><text fill="#000000" font-family="Arial" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="175.1982" x="771.2779" y="1070.6319">Runtime Artifacts (untracked)</text><rect fill="none" height="140.3765" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="669.8958" x="12" y="71.1362"/><text fill="#000000" font-family="Arial" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="91.0506" x="301.4226" y="85.9642">External Inputs</text><!--entity L_INSTALL--><g class="entity" data-qualified-name="LAYER_PANEL.L_INSTALL" data-source-line="22" id="ent0003"><rect fill="#D5E8D4" height="150.7529" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="350.2424" x="317.2133" y="351.8567"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="110.8928" x="327.2133" y="374.6848">1) Installation Layer</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="56.8804" x="327.2133" y="391.0289">- install.sh</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="330.2424" x="327.2133" y="407.3731">- detects package manager (apt/dnf/pacman/brew/zypper)</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="199.2254" x="327.2133" y="423.7172">- installs tmux, clones/updates TPM</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="172.1292" x="327.2133" y="440.0613">- backs up existing /.tmux.conf</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="218.4496" x="327.2133" y="456.4054">- runs TPM headlessly to install plugins</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="116.8089" x="327.2133" y="472.7495">- invokes sessions.sh</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="265.4419" x="327.2133" y="489.0936">- wires alias source guard into /.bashrc / /.zshrc</text></g><!--entity L_CONFIG--><g class="entity" data-qualified-name="LAYER_PANEL.L_CONFIG" data-source-line="24" id="ent0004"><rect fill="#D5E8D4" height="118.0647" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="374.0145" x="549.3588" y="542.6097"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="125.6409" x="559.3588" y="565.4377">2) Configuration Layer</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="152.7862" x="559.3588" y="581.7819">- tmux.conf  &#8594;  /.tmux.conf</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="319.6343" x="559.3588" y="598.126">- 256-color + true-color, mouse, 50k history, base-index 1</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="282.674" x="559.3588" y="614.4701">- intuitive split/nav bindings + reload key (prefix+r)</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="354.0145" x="559.3588" y="630.8142">- TPM plugins: tmux-sensible, tmux-resurrect, tmux-continuum</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="299.6182" x="559.3588" y="647.1583">- auto-save every 15 min, auto-restore on server start</text></g><!--entity L_SESSION--><g class="entity" data-qualified-name="LAYER_PANEL.L_SESSION" data-source-line="26" id="ent0005"><rect fill="#D5E8D4" height="118.0647" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="339.1807" x="809.7018" y="700.6743"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="168.9612" x="819.7018" y="723.5024">3) Session Management Layer</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="70.8965" x="819.7018" y="739.8465">- sessions.sh</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="308.1502" x="819.7018" y="756.1907">- scans GIT_BASE (default: /mnt/4tb-m2/git) for .git dirs</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="319.1807" x="819.7018" y="772.5348">- derives tmux-safe session name (/ &#8594; -, spaces/dots &#8594; -)</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="262.994" x="819.7018" y="788.8789">- creates sessions idempotently (skips existing)</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="272.654" x="819.7018" y="805.223">- ensures tmux server is running before creation</text></g><!--entity L_ALIAS--><g class="entity" data-qualified-name="LAYER_PANEL.L_ALIAS" data-source-line="28" id="ent0006"><rect fill="#D5E8D4" height="101.7206" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="383.9386" x="843.8529" y="858.7391"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="73.9085" x="853.8529" y="881.5672">4) Alias Layer</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="346.7064" x="853.8529" y="897.9113">- writes /.terminility_aliases (regenerated atomically each run)</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="363.9386" x="853.8529" y="914.2554">- one alias per session: tmux new-session -A -s &lt;name&gt; -c &lt;path&gt;</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="232.5857" x="860.093" y="930.5995">(-A: attach or create; -c: start in repo root)</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="309.3983" x="853.8529" y="946.9436">- install.sh adds source guard to shell RCs (idempotent)</text></g><!--entity F_INSTALL--><g class="entity" data-qualified-name="SOURCE_PANEL.F_INSTALL" data-source-line="32" id="ent0008"><rect fill="#DAE8FC" height="52.6882" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="150.0689" x="970.7373" y="143.8244"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="49.8963" x="980.7373" y="166.6525">install.sh</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="130.0689" x="980.7373" y="182.9966">Full install orchestrator</text></g><!--entity F_SESSIONS--><g class="entity" data-qualified-name="SOURCE_PANEL.F_SESSIONS" data-source-line="33" id="ent0009"><rect fill="#DAE8FC" height="69.0323" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="195.5613" x="1140.8062" y="127.4803"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="63.9125" x="1150.8062" y="150.3084">sessions.sh</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="175.5613" x="1150.8062" y="166.6525">Repo scanner + session creator</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="95.0767" x="1150.8062" y="182.9966">+ alias generator</text></g><!--entity F_CONF--><g class="entity" data-qualified-name="SOURCE_PANEL.F_CONF" data-source-line="34" id="ent0010"><rect fill="#DAE8FC" height="52.6882" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="172.0531" x="1356.3675" y="143.8244"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="57.0964" x="1366.3675" y="166.6525">tmux.conf</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="152.0531" x="1366.3675" y="182.9966">Tmux configuration source</text></g><!--entity F_DOCS--><g class="entity" data-qualified-name="SOURCE_PANEL.F_DOCS" data-source-line="35" id="ent0011"><rect fill="#DAE8FC" height="69.0323" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="233.8415" x="716.8958" y="127.4803"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="30.6122" x="726.8958" y="150.3084">docs/</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="213.8415" x="726.8958" y="166.6525">contributor-architecture-blueprint.md</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="188.5573" x="726.8958" y="182.9966">diagrams/repo-architecture.puml</text></g><!--entity RT_CONF--><g class="entit