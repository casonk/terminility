# ─── Prefix ───────────────────────────────────────────────────────────────────
# Keep default Ctrl+b; uncomment below to use Ctrl+a instead
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# ─── General ──────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
setw -g aggressive-resize on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ─── Mouse ────────────────────────────────────────────────────────────────────
set -g mouse on

# ─── Key Bindings ─────────────────────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Status Bar ───────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-bg colour234
set -g status-fg colour137
set -g status-left '#[fg=colour233,bg=colour241,bold] #S '
set -g status-right '#[fg=colour233,bg=colour241,bold] %H:%M %d-%b '
set -g status-right-length 50
set -g status-left-length 20

setw -g window-status-current-format '#[fg=colour81,bg=colour238,bold] #I:#W#F '
setw -g window-status-format '#[fg=colour138,bg=colour235] #I:#W#F '

# ─── Plugins ──────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# ─── Session Resume (tmux-resurrect + tmux-continuum) ─────────────────────────
set -g @resurrect-capture-pane-contents 'on'   # save pane content
set -g @continuum-restore 'on'                 # auto-restore on tmux start
set -g @continuum-save-interval '15'           # auto-save every 15 minutes

# Manual save:    prefix + Ctrl+s
# Manual restore: prefix + Ctrl+r

# ─── Initialize TPM (must be last line) ───────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
